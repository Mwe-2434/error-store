<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERROR STORE</title>
  <style>
    :root{
      --bg1:#091224; --bg2:#060d1b; --bg3:#020611;
      --card:rgba(11,19,36,.95); --line:rgba(148,163,184,.14);
      --text:#fff; --muted:#c7d2fe; --red:#dc2626; --blue:#2563eb; --green:#16a34a; --gold:#ffd166;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{margin:0;font-family:Tahoma,Arial,sans-serif;color:var(--text);background:
      radial-gradient(circle at top, rgba(37,99,235,.18), transparent 28%),
      radial-gradient(circle at 20% 20%, rgba(239,68,68,.08), transparent 24%),
      linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));min-height:100vh}
    a{text-decoration:none;color:inherit} img{display:block;max-width:100%}
    button,input,textarea,select{font:inherit} .hidden{display:none!important}
    .container{width:min(1280px,calc(100% - 24px));margin:0 auto}
    .topbar{position:sticky;top:0;z-index:60;background:rgba(4,10,24,.84);backdrop-filter:blur(12px);border-bottom:1px solid rgba(148,163,184,.16)}
    .topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900}.brand-badge{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(37,99,235,.9),rgba(220,38,38,.72))}
    .brand-title{font-size:28px;line-height:1}.brand-sub{font-size:12px;color:#dbeafe;margin-top:4px}
    .nav{display:flex;gap:8px;flex-wrap:wrap}.nav a,.btn,.ghost,.danger,.success,.small{border:none;cursor:pointer;border-radius:16px;padding:11px 16px;transition:.18s ease}
    .nav a,.ghost,.small,select,.field,.textarea{background:rgba(6,14,28,.9);border:1px solid rgba(148,163,184,.16);color:#fff}
    .btn{background:#fff;color:#0f172a;font-weight:700}.danger{background:var(--red);color:#fff;font-weight:700}.success{background:var(--green);color:#fff;font-weight:700}.small{padding:9px 12px}
    .nav a:hover,.btn:hover,.ghost:hover,.danger:hover,.success:hover,.small:hover{transform:translateY(-1px)}
    #checkoutPlayerIdWrap.hidden{display:none!important}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .lang-select,.currency-select,.field,.textarea,.select{padding:12px 14px;border-radius:16px}
    .hero{padding:24px 0 16px;display:grid;grid-template-columns:1.2fr .8fr;gap:20px}
    .panel,.card,.product-card,.offer-card,.invoice-card,.stat-box,.admin-item,.cart-item,.quick-card{background:linear-gradient(180deg,rgba(11,19,36,.95),rgba(7,12,24,.98));border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 45px rgba(0,0,0,.25);overflow:hidden}
    .hero-banner{min-height:380px;background:
      linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.55)),
      radial-gradient(circle at center, rgba(37,99,235,.1), rgba(2,6,23,.88)),
      url('error_logo.png') center/contain no-repeat;display:flex;align-items:end}
    .hero-overlay{padding:28px;width:100%}.tag{display:inline-flex;padding:8px 14px;border-radius:999px;background:linear-gradient(90deg,rgba(220,38,38,.95),rgba(37,99,235,.95));font-size:13px;font-weight:700;margin-bottom:14px}
    .hero-title{font-size:clamp(30px,4vw,50px);font-weight:900;line-height:1.08;margin:0 0 12px}.hero-text{color:#dbe7ff;line-height:1.9;max-width:60ch}
    .actions,.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .panel-head{padding:20px 20px 8px}.panel-body,.card-body,.product-info,.offer-body,.invoice-body,.box-body{padding:0 20px 20px}
    .panel-title,.section-title,.card-title,.product-title,.invoice-title{font-weight:900;margin:0}.panel-title{font-size:22px}.panel-sub,.muted,.section-sub{color:var(--muted);line-height:1.8}
    .stats-grid,.cards-grid,.products-grid,.offers-grid,.invoice-grid,.admin-grid,.quick-grid{display:grid;gap:18px}
    .stats-grid{grid-template-columns:repeat(2,1fr)} .cards-grid{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
    .products-grid{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))} .offers-grid{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
    .invoice-grid{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))} .admin-grid{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))} .quick-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .stat-box,.quick-card{padding:18px}.stat-label,.quick-label,.smalltxt{font-size:13px;color:#93c5fd}.stat-value,.quick-value{font-size:22px;font-weight:900;margin-top:10px}
    section{padding:18px 0}.section-head{display:flex;justify-content:space-between;align-items:end;gap:14px;flex-wrap:wrap;margin-bottom:18px}
    .section-title{font-size:clamp(24px,3vw,34px)} .pill{padding:9px 14px;border-radius:999px;background:rgba(37,99,235,.22);border:1px solid rgba(147,197,253,.2);font-size:13px;font-weight:700;color:#dbeafe}
    .card img,.offer-card img,.selected-cover{width:100%;object-fit:cover}.card img,.offer-card img{height:180px}.selected-cover{height:260px}.product-image img{width:100%;height:240px;object-fit:cover}
    .chiplist,.chips,.line-list{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 12px;border-radius:999px;background:rgba(37,99,235,.16);border:1px solid rgba(191,219,254,.15);font-size:12px;font-weight:700;color:#dbeafe}
    .two-col{display:grid;grid-template-columns:minmax(320px,390px) minmax(0,1fr);gap:20px}.sticky{position:sticky;top:92px}
    .category-tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:16px}.category-btn{border:none;border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer}.category-btn.active{background:linear-gradient(90deg,#ef4444,#2563eb);font-weight:900}
    .product-badge{position:absolute;top:12px;left:12px;padding:7px 12px;border-radius:999px;background:rgba(245,158,11,.92);font-size:12px;font-weight:900}
    .price-now{font-size:26px;color:var(--gold);font-weight:900;direction:ltr;unicode-bidi:plaintext}.price-old{font-size:15px;color:#cbd5e1;text-decoration:line-through;min-height:22px;direction:ltr;unicode-bidi:plaintext}
    .details{margin-top:12px;padding:12px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)} .details ul{margin:8px 0 0;padding-right:18px;line-height:1.8;color:#dbeafe}
    html[dir="ltr"] .details ul{padding-right:0;padding-left:18px}
    .notice{margin-top:8px;padding:14px 16px;border-radius:20px;border:1px solid rgba(96,165,250,.18);background:linear-gradient(180deg,rgba(30,64,175,.16),rgba(15,23,42,.5));color:#dbeafe;line-height:1.8}
    .warning{border-color:rgba(250,204,21,.2);background:rgba(234,179,8,.12);color:#fef3c7}.danger-note{border-color:rgba(248,113,113,.2);background:rgba(239,68,68,.12);color:#fee2e2}
    .cart-list,.admin-table{display:grid;gap:12px}.cart-item,.admin-item{padding:16px}.cart-top,.admin-top{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:start}.thumb{width:92px;height:74px;object-fit:cover;border-radius:16px}
    .qty{width:34px;height:34px;border:none;border-radius:12px;background:rgba(37,99,235,.18);color:#fff;cursor:pointer}
    .status{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:900}.unpaid{background:rgba(239,68,68,.14);color:#fecaca}.paid{background:rgba(34,197,94,.14);color:#bbf7d0}.delivered{background:rgba(59,130,246,.16);color:#bfdbfe}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:20px;z-index:120}.modal.active{display:flex}
    .modal-box{width:min(760px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,#0a1837,#07142e);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:22px}
    .modal-head{display:flex;justify-content:space-between;align-items:start;gap:12px;margin-bottom:16px}.close{width:40px;height:40px;border:none;border-radius:14px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer}
    .form-grid{display:grid;gap:14px}.label{display:block;font-size:14px;font-weight:700;margin-bottom:8px}
    .field,.textarea,.select,.lang-select,.currency-select{width:100%}
    .field,.textarea,.select,.lang-select,.currency-select{outline:none}
    .textarea{min-height:120px;resize:vertical}
    .product-info,.offer-body,.invoice-body,.card-body,.box-body{display:flex;flex-direction:column;gap:10px}
    .admin-item .flex,.invoice-body .flex,.cart-item .flex{margin-top:12px}
    .month-row{padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.12);margin-bottom:12px}
    .bar{height:10px;border-radius:999px;background:rgba(148,163,184,.16);overflow:hidden;margin-top:10px}
    .bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,rgba(220,38,38,.95),rgba(37,99,235,.95))}
    .tabs{display:flex;gap:8px;background:rgba(255,255,255,.05);padding:6px;border-radius:18px;margin-bottom:16px}.tab-btn{flex:1;border:none;border-radius:14px;padding:12px;background:transparent;color:#fff;cursor:pointer;font-weight:700}.tab-btn.active{background:rgba(37,99,235,.35)}
    .tab-panel{display:none}.tab-panel.active{display:block}.footer{padding:36px 0 45px;color:#94a3b8;text-align:center;font-size:14px}
    @media (max-width:1100px){.two-col{grid-template-columns:1fr}.sticky{position:static}.quick-grid{grid-template-columns:1fr}}
    @media (max-width:760px){.container{width:min(100% - 18px,1280px)}.nav{width:100%;overflow:auto;flex-wrap:nowrap}.hero{grid-template-columns:1fr}.stats-grid,.quick-grid{grid-template-columns:1fr}.product-image img,.selected-cover,.card img,.offer-card img{height:210px}.actions>*,.flex>*{flex:1 1 100%}}
  </style>
</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <div class="brand">
      <div class="brand-badge brand-logo-badge">
        <img
          src="https://cdn.discordapp.com/attachments/1377005390633635960/1489804482958069851/ad68d003-ae63-4208-a915-263807624414.png?ex=69d1c00b&is=69d06e8b&hm=81a4eecbb3d697efb3d9f6f604dc85353972bdac1cc21f32b802aea3aef3c5e7&"
          alt="ERROR STORE Logo"
          class="brand-logo-img"
        >
      </div>

      <div class="brand-text">
        <div class="brand-title">ERROR STORE</div>
        <div class="brand-sub">مرحبا بكم في متجر ايرور ستور</div>
      </div>
    </div>

    <nav class="nav">
      <a href="#home" data-t="nav.home"></a>
      <a href="#games" data-t="nav.games"></a>
      <a href="#cart" data-t="nav.cart"></a>
      <a href="#invoices" data-t="nav.invoices"></a>
      <a href="#income" id="incomeNav" class="hidden" data-t="nav.income"></a>
      <a href="#admin" id="adminNav" class="hidden" data-t="nav.admin"></a>
    </nav>

    <div class="toolbar">
      <select id="languageSelect" class="lang-select"></select>
      <select id="currencySelect" class="currency-select"></select>
      <div class="pill" id="cartCountPill"></div>
      <button class="btn" id="openAuthBtn" data-t="btn.auth"></button>
      <button class="ghost hidden" id="logoutBtn" data-t="btn.logout"></button>
    </div>
  </div>
</header>

<style>
  .brand{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:900;
  min-width: fit-content;
}

.brand-badge{
  width:62px;
  height:62px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:linear-gradient(135deg,#2563eb,#dc2626);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 8px 22px rgba(0,0,0,.28);
  flex-shrink:0;
}

.brand-logo-badge{
  padding:3px;
}

.brand-logo-img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:15px;
  display:block;
}

.brand-text{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.brand-title{
  font-size:28px;
  line-height:1;
  font-weight:900;
  color:#fff;
  letter-spacing:.5px;
  text-shadow:0 2px 10px rgba(0,0,0,.22);
  white-space:nowrap;
}

.brand-sub{
  font-size:13px;
  margin-top:6px;
  color:#dbeafe;
  line-height:1.4;
}

@media (max-width:760px){
  .topbar-inner{
    flex-direction:column;
    align-items:stretch;
  }

  .brand{
    justify-content:center;
  }

  .brand-title{
    font-size:22px;
    white-space:normal;
    text-align:center;
  }

  .brand-sub{
    text-align:center;
  }

  .nav{
    justify-content:center;
  }

  .toolbar{
    justify-content:center;
  }
}
</style>

<main class="container">
  <section class="hero" id="home">
    <div class="panel hero-banner">
      <div class="hero-overlay">
        <div class="tag" data-t="hero.tag"></div>
        <h1 class="hero-title" data-t="hero.title"></h1>
        <p class="hero-text" data-t="hero.text"></p>
        <div class="actions">
          <a class="danger" href="#games" data-t="hero.browse"></a>
          <a class="ghost" href="#admin" data-t="hero.admin"></a>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title" data-t="search.title"></h2>
          <p class="panel-sub" data-t="search.sub"></p>
        </div>
        <div class="panel-body">
          <input class="field" id="searchInput">
          <div class="smalltxt" id="searchHint"></div>
        </div>
      </div>
      <div class="panel hidden" id="summaryPanel">
        <div class="panel-head">
          <h2 class="panel-title" data-t="summary.title"></h2>
          <p class="panel-sub" data-t="summary.sub"></p>
        </div>
        <div class="panel-body stats-grid">
          <div class="stat-box"><div class="stat-label" data-t="summary.totalIncome"></div><div class="stat-value" id="totalIncome"></div></div>
          <div class="stat-box"><div class="stat-label" data-t="summary.invoiceCount"></div><div class="stat-value" id="ordersCount"></div></div>
          <div class="stat-box"><div class="stat-label" data-t="summary.currentUser"></div><div class="stat-value" id="currentUserText" style="font-size:18px"></div></div>
          <div class="stat-box"><div class="stat-label" data-t="summary.paidInvoices"></div><div class="stat-value" id="paidCountText" style="font-size:18px"></div></div>
        </div>
      </div>
    </div>
  </section>

  <div class="notice" id="noticeBox"></div>

  <section class="quick-strip">
    <div class="quick-grid">
      <div class="quick-card"><div class="quick-label" data-t="quick.pubgLabel"></div><div class="quick-value" data-t="quick.pubgValue"></div></div>
      <div class="quick-card"><div class="quick-label" data-t="quick.currencyLabel"></div><div class="quick-value" data-t="quick.currencyValue"></div></div>
      <div class="quick-card"><div class="quick-label" data-t="quick.purchaseLabel"></div><div class="quick-value" data-t="quick.purchaseValue"></div></div>
    </div>
  </section>

  <section id="games">
    <div class="section-head">
      <div><h2 class="section-title" data-t="sections.main"></h2><p class="section-sub" data-t="sections.mainSub"></p></div>
      <div class="pill" id="gamesCountPill"></div>
    </div>
    <div class="cards-grid" id="gamesGrid"></div>
  </section>

  <section>
    <div class="two-col">
      <div class="panel sticky">
        <img class="selected-cover" id="selectedGameImage" src="pubg.webp" alt="">
        <div class="box-body">
          <h3 class="card-title" id="selectedGameName"></h3>
          <p class="muted" id="selectedGameDescription"></p>
          <div class="chiplist" id="selectedGameOffers"></div>
          <div class="category-tabs" id="categoryTabs"></div>
        </div>
      </div>
      <div>
        <div class="section-head">
          <div><h2 class="section-title" id="productsSectionTitle"></h2><p class="section-sub" data-t="sections.productsSub"></p></div>
          <div class="pill" id="productsCountPill"></div>
        </div>
        <div class="products-grid" id="productsGrid"></div>
      </div>
    </div>
  </section>

  <section id="offers">
    <div class="section-head">
      <div><h2 class="section-title" data-t="sections.offers"></h2><p class="section-sub" data-t="sections.offersSub"></p></div>
      <div class="pill" data-t="sections.live"></div>
    </div>
    <div class="offers-grid" id="offersGrid"></div>
  </section>

  <section id="cart">
    <div class="section-head">
      <div><h2 class="section-title" data-t="sections.cart"></h2><p class="section-sub" data-t="sections.cartSub"></p></div>
      <div class="pill" id="cartTotalPill"></div>
    </div>
    <div class="panel"><div class="panel-body" style="padding-top:22px">
      <div class="cart-list" id="cartList"></div>
      <div class="actions" style="margin-top:18px">
        <button class="danger" id="openCheckoutBtn" data-t="btn.createInvoice"></button>
        <button class="ghost" id="clearCartBtn" data-t="btn.clearCart"></button>
      </div>
    </div></div>
  </section>

  <section id="invoices">
    <div class="section-head">
      <div><h2 class="section-title" data-t="sections.invoices"></h2><p class="section-sub" data-t="sections.invoicesSub"></p></div>
      <div class="pill" id="invoiceCountPill"></div>
    </div>
    <div class="invoice-grid" id="invoiceGrid"></div>
  </section>

  <section id="income" class="hidden">
    <div class="section-head">
      <div><h2 class="section-title" data-t="sections.income"></h2><p class="section-sub" data-t="sections.incomeSub"></p></div>
      <div class="pill" id="incomeCurrencyPill"></div>
    </div>
    <div class="panel"><div class="panel-body" style="padding-top:22px">
      <div id="incomeRows"></div>
      <div class="admin-grid" style="margin-top:20px">
        <div class="quick-card"><div class="quick-label" data-t="income.best"></div><div class="quick-value" id="bestMonthText"></div></div>
        <div class="quick-card"><div class="quick-label" data-t="income.avg"></div><div class="quick-value" id="avgMonthText"></div></div>
        <div class="quick-card"><div class="quick-label" data-t="income.noteTitle"></div><div class="muted" data-t="income.note"></div></div>
      </div>
    </div></div>
  </section>

  <section id="admin" class="hidden">
    <div class="section-head">
      <div><h2 class="section-title" data-t="admin.title"></h2><p class="section-sub" data-t="admin.sub"></p></div>
      <div class="pill" data-t="admin.local"></div>
    </div>

    <div class="panel" style="margin-bottom:20px">
      <div class="panel-head"><h3 class="panel-title" data-t="admin.invoices"></h3><p class="panel-sub" data-t="admin.invoicesSub"></p></div>
      <div class="panel-body"><div class="admin-table" id="adminInvoicesTable"></div></div>
    </div>

    <div class="panel" style="margin-bottom:20px">
      <div class="panel-head"><h3 class="panel-title" data-t="admin.prices"></h3><p class="panel-sub" data-t="admin.pricesSub"></p></div>
      <div class="panel-body admin-grid">
        <div><label class="label" data-t="admin.currency"></label><select class="select" id="adminCurrencySelect"></select></div>
        <div><label class="label" data-t="admin.section"></label><select class="select" id="adminGameSelect"></select></div>
        <div><label class="label" data-t="admin.category"></label><select class="select" id="adminCategorySelect"></select></div>
      </div>
      <div class="panel-body"><div class="admin-table" id="adminProductsTable"></div></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h3 class="panel-title" data-t="admin.addTitle"></h3><p class="panel-sub" data-t="admin.addSub"></p></div>
      <div class="panel-body admin-grid">
        <div><label class="label" data-t="admin.section"></label><select class="select" id="adminAddGameSelect"></select></div>
        <div><label class="label" data-t="admin.category"></label><select class="select" id="adminAddCategorySelect"></select></div>
        <div><label class="label" data-t="admin.productName"></label><input class="field" id="adminProductName"></div>
        <div><label class="label" data-t="admin.basePrice"></label><input class="field" id="adminProductPrice"></div>
        <div><label class="label" data-t="admin.oldPrice"></label><input class="field" id="adminOldPrice"></div>
        <div><label class="label" data-t="admin.note"></label><input class="field" id="adminProductNote"></div>
        <div style="grid-column:1/-1"><button class="danger" id="addProductBtn" data-t="btn.addProduct"></button></div>
      </div>
    </div>
  </section>
</main>

<footer class="footer" data-t="footer"></footer>

<div class="modal" id="authModal">
  <div class="modal-box">
    <div class="modal-head">
      <div><h3 class="panel-title" data-t="auth.title"></h3><p class="panel-sub" data-t="auth.sub"></p></div>
      <button class="close" data-close="authModal">✕</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-auth-tab="login" data-t="auth.loginTab"></button>
      <button class="tab-btn" data-auth-tab="register" data-t="auth.registerTab"></button>
    </div>
    <div class="tab-panel active" id="authLoginPanel">
      <div class="form-grid">
        <div><label class="label" data-t="fields.email"></label><input class="field" id="loginEmail"></div>
        <div><label class="label" data-t="fields.password"></label><input type="password" class="field" id="loginPassword"></div>
        <button class="danger" id="loginBtn" data-t="btn.login"></button>

function ensureDataIntegrity(){
  if(!Array.isArray(games) || !games.length) games = JSON.parse(JSON.stringify(defaultGames));
  if(!Array.isArray(cart)) cart = [];
  if(!Array.isArray(invoices)) invoices = [];
  if(!Array.isArray(users)) users = [];
  games.forEach(game => {
    if(!Array.isArray(game.categoryOrder)) game.categoryOrder = Object.keys(game.categories || {});
    game.categories = game.categories || {};

      category.products.forEach(product => {

  document.getElementById('invoiceCountPill').textContent = tt('misc.invoiceCount', {n:list.length});
  if(!list.length){ document.getElementById('invoiceGrid').innerHTML = `<div class="muted">${tt('misc.emptyInvoices')}</div>`; return; }
  document.getElementById('invoiceGrid').innerHTML = list.map(i=>`
    <article class="invoice-card">
      <div class="invoice-body">
        <div class="flex" style="justify-content:space-between">
          <div class="status ${i.paymentStatus==='paid'?'paid':'unpaid'}">${tt('misc.' + (i.paymentStatus==='paid'?'paid':'unpaid'))}</div>
          <div class="status ${i.deliveryStatus==='received'?'delivered':'unpaid'}">${tt('misc.' + (i.deliveryStatus==='received'?'received':'pending'))}</div>
        </div>
        <h3 class="invoice-title">Invoice ${i.invoiceCode}</h3>
        <div class="muted">${tt('misc.buyer')}: ${i.customerName}</div>
        <div class="muted">${tt('misc.email')}: ${i.customerEmail}</div>
        <div class="muted">${tt('misc.discord')}: ${i.discordName || tt('misc.notProvided')}</div>
        <div class="muted">${tt('misc.phone')}: ${i.customerPhone || tt('misc.notProvided')}</div>
        <div class="muted">${tt('misc.payment')}: ${i.paymentMethod}</div>
        <div class="muted">${tt('misc.player')}: ${i.playerId}</div>
        <div class="muted">${tt('misc.currency')}: ${CURRENCIES[i.currencyCode]?.[lang] || i.currencyCode}</div>
        <div class="line-list">${i.items.map(x=>`<span class="chip">${x.name} × ${x.qty}</span>`).join('')}</div>
        <div class="pill">${fmtMoney(i.total, i.currencyCode)}</div>
        ${i.customerPhone ? `<div class="flex"><a class="small" target="_blank" rel="noopener" href="https://wa.me/${wa(i.customerPhone)}?text=${encodeURIComponent('ERROR STORE - ' + i.invoiceCode)}">WhatsApp</a></div>` : ''}
        <div class="smalltxt">${tt('misc.created')}: ${i.createdAt}</div>
      </div>
    </article>`).join('');
}
function renderAdminInvoices(){
  if(!isAdmin()){ document.getElementById('adminInvoicesTable').innerHTML=''; return; }
  if(!invoices.length){ document.getElementById('adminInvoicesTable').innerHTML = `<div class="muted">${tt('misc.emptyInvoices')}</div>`; return; }
  document.getElementById('adminInvoicesTable').innerHTML = invoices.map(i=>`
    <div class="admin-item">
      <div class="admin-top">
        <img class="thumb" src="${i.items[0]?.image || 'pubg.webp'}" alt="${i.invoiceCode}">
        <div>
          <div style="font-weight:900">${i.invoiceCode}</div>
          <div class="smalltxt">${i.customerName} - ${i.customerEmail}</div>
          <div class="smalltxt">${tt('misc.phone')}: ${i.customerPhone || tt('misc.notProvided')}</div>
          <div class="smalltxt">${tt('misc.currency')}: ${CURRENCIES[i.currencyCode]?.[lang] || i.currencyCode}</div>
        </div>
      </div>
      <div class="line-list">
        <span class="chip">${tt('misc.' + (i.paymentStatus==='paid'?'paid':'unpaid'))}</span>
        <span class="chip">${tt('misc.' + (i.deliveryStatus==='received'?'received':'pending'))}</span>
        <span class="chip">${fmtMoney(i.total, i.currencyCode)}</span>
      </div>
      <div class="smalltxt">${tt('misc.items')}: ${i.items.map(x=>`${x.name} × ${x.qty}`).join(' - ')}</div>
      <div class="flex">
        <button class="success" onclick="approveInvoice('${i.id}')">${tt('btn.approve')}</button>
        <button class="small" onclick="togglePaid('${i.id}')">${tt('btn.toggle')}</button>
        <button class="danger" onclick="deleteInvoice('${i.id}')">${tt('btn.deleteInvoice')}</button>
      </div>
    </div>`).join('');
}
function renderAdminProducts(){
  if(!isAdmin()){ document.getElementById('adminProductsTable').innerHTML=''; return; }
  const code=document.getElementById('adminCurrencySelect').value || activeCurrency;
  const game=getGame(document.getElementById('adminGameSelect').value || selectedGameId);
  const categoryId=document.getElementById('adminCategorySelect').value || (game.categoryOrder||Object.keys(game.categories))[0];
  const category=getCategory(game, categoryId);
  document.getElementById('adminProductsTable').innerHTML = category.products.map(p=>`
    <div class="admin-item">
      <div class="admin-top">
        <img class="thumb" src="${p.image}" alt="${p.name}">
        <div>
          <div style="font-weight:900">${p.name}</div>
          <div class="smalltxt">${p.note || ''}</div>
          <div class="smalltxt">${tt('misc.currentPrice')}: ${fmtMoney(priceOf(p,code), code)}</div>
        </div>
      </div>
      <div class="flex">
        <input class="field" style="max-width:180px" id="price-${p.id}" value="${p.prices[code] ?? ''}" placeholder="${lang==='ar'?'السعر':'Price'}">
        <input class="field" style="max-width:180px" id="old-${p.id}" value="${p.oldPrices?.[code] ?? ''}" placeholder="${lang==='ar'?'السعر القديم':'Old price'}">
        <button class="danger" onclick="saveCurrencyPrice('${game.id}','${categoryId}','${p.id}')">${tt('btn.save')}</button>
        <button class="ghost" onclick="removeAdminProduct('${game.id}','${categoryId}','${p.id}')">${tt('btn.remove')}</button>
      </div>
    </div>`).join('');
}
function renderAll(){
  applyStaticText();
  fillLangSelect();
  fillCurrencySelects();
  fillGameSelects();
  renderGames();
  renderSelectedGame();
  renderOffers();
  renderStats();
  renderCart();
  renderInvoices();
  renderIncome();
  renderAdminInvoices();
  renderAdminProducts();
}
window.selectGame = function(id){ selectedGameId=id; selectedCategoryId=(getGame(id).categoryOrder||Object.keys(getGame(id).categories))[0]; renderSelectedGame(); renderAdminProducts(); note(getGame(id).short + (lang==='ar'?' تم فتحه.':' opened.')); }
window.selectCategory = function(id){ selectedCategoryId=id; renderSelectedGame(); renderAdminProducts(); }
window.toggleDetails = function(id){ document.getElementById('details-'+id)?.classList.toggle('hidden'); }
window.addToCart = function(gameId, categoryId, productId){
  const ref=flatten(gameId,categoryId,productId); if(!ref.product) return;
  if((priceOf(ref.product)||0)<=0){ note(tt('misc.needPrice'),'warning'); return; }
  const key=`${gameId}-${categoryId}-${productId}`; const existing=cart.find(x=>x.key===key); if(existing) existing.qty+=1; else cart.push({key,gameId,categoryId,productId,qty:1});
  saveAll(); renderCart(); updateCheckoutRequirements(); note(tt('misc.added'));
}
window.changeQty = function(key,delta){ const item=cart.find(x=>x.key===key); if(!item) return; item.qty+=delta; if(item.qty<=0) cart=cart.filter(x=>x.key!==key); saveAll(); renderCart(); updateCheckoutRequirements(); }
window.removeFromCart = function(key){ cart=cart.filter(x=>x.key!==key); saveAll(); renderCart(); updateCheckoutRequirements(); note(tt('misc.removed')); }
window.approveInvoice = function(id){
  if(!isAdmin()){ note(tt('misc.adminOnly'),'danger'); return; }
  const inv=invoices.find(x=>x.id===id); if(!inv) return;
  inv.paymentStatus='paid'; inv.deliveryStatus='received'; saveAll(); renderAll(); updateCheckoutRequirements(); note(tt('misc.invoiceApproved',{c:inv.invoiceCode}));
}
window.togglePaid = function(id){
  if(!isAdmin()){ note(tt('misc.adminOnly'),'danger'); return; }
  const inv=invoices.find(x=>x.id===id); if(!inv) return;
  inv.paymentStatus=inv.paymentStatus==='paid'?'unpaid':'paid'; inv.deliveryStatus=inv.paymentStatus==='paid'?'received':'pending'; saveAll(); renderAll(); note(tt('misc.invoiceUpdated',{c:inv.invoiceCode}));
}
window.deleteInvoice = function(id){
  if(!isAdmin()){ note(tt('misc.adminOnly'),'danger'); return; }
  const inv=invoices.find(x=>x.id===id); if(!inv) return;
  if(!window.confirm(tt('misc.deleteInvoiceConfirm'))) return;
  invoices=invoices.filter(x=>x.id!==id);
  saveAll(); renderAll(); note(tt('misc.invoiceDeleted',{c:inv.invoiceCode}));
}
window.removeAdminProduct = function(gameId, categoryId, productId){
  if(!isAdmin()){ note(tt('misc.adminOnly'),'danger'); return; }
  const game=getGame(gameId); const category=getCategory(game, categoryId);
  const item=category.products.find(p=>p.id===productId);
  if(!item) return;
  if(!window.confirm((lang==='ar' ? 'هل تريد حذف هذا المنتج؟' : 'Do you want to delete this product?') + ' - ' + item.name)) return;
  category.products = category.products.filter(p=>p.id!==productId);
  cart = cart.filter(x=>!(x.gameId===gameId && x.categoryId===categoryId && x.productId===productId));
  saveAll(); renderAll(); note(lang==='ar' ? 'تم حذف المنتج.' : 'Product deleted.');
}

window.saveCurrencyPrice = function(gameId, categoryId, productId){
  if(!isAdmin()){ note(tt('misc.adminOnly'),'danger'); return; }
  const code=document.getElementById('adminCurrencySelect').value || activeCurrency;
  const ref=flatten(gameId,categoryId,productId); const next=Number(document.getElementById('price-'+productId).value.trim()); const oldRaw=document.getElementById('old-'+productId).value.trim(); const oldVal=oldRaw===''?null:Number(oldRaw);
  if(!Number.isFinite(next)){ note(tt('misc.badPrice'),'danger'); return; }
  ref.product.prices[code]=round2(next); if(!ref.product.oldPrices) ref.product.oldPrices={}; if(oldVal===null) delete ref.product.oldPrices[code]; else ref.product.oldPrices[code]=round2(oldVal);
  saveAll(); renderAll(); note(tt('misc.priceSaved',{n:ref.product.name,c:code}));
}

document.getElementById('searchInput').addEventListener('input', renderGames);
document.getElementById('languageSelect').addEventListener('change', ()=>{ lang=document.getElementById('languageSelect').value; saveAll(); renderAll(); note(tt('misc.currencyChanged')); });
document.getElementById('currencySelect').addEventListener('change', ()=>{ activeCurrency=document.getElementById('currencySelect').value; saveAll(); renderAll(); note(tt('misc.currencyChanged')); });
document.getElementById('adminCurrencySelect').addEventListener('change', renderAdminProducts);
document.getElementById('adminGameSelect').addEventListener('change', ()=>{ fillCategorySelects(); renderAdminProducts(); });
document.getElementById('adminCategorySelect').addEventListener('change', renderAdminProducts);
document.getElementById('adminAddGameSelect').addEventListener('change', fillCategorySelects);

document.getElementById('openAuthBtn').addEventListener('click', ()=>document.getElementById('authModal').classList.add('active'));
document.getElementById('logoutBtn').addEventListener('click', ()=>{ currentUser=null; saveAll(); renderAll(); note(tt('misc.logoutSuccess')); });
document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', ()=>document.getElementById(b.dataset.close).classList.remove('active')));
document.querySelectorAll('[data-auth-tab]').forEach(btn=>btn.addEventListener('click', ()=>{
  document.querySelectorAll('[data-auth-tab]').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(btn.dataset.authTab==='login'?'authLoginPanel':'authRegisterPanel').classList.add('active');
}));

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email=document.getElementById('loginEmail').value.trim().toLowerCase(); const pass=document.getElementById('loginPassword').value;
  const user=users.find(u=>(u.email||'').toLowerCase()===email); if(!user){ note(tt('misc.loginFailed'),'danger'); return; }
  const hash=await sha256(pass); if(user.passwordHash!==hash){ note(tt('misc.loginFailed'),'danger'); return; }
  if(!user.verified){ note(lang==='ar' ? 'هذا الحساب غير مفعل بعد.' : 'This account is not verified yet.','warning'); return; }
  currentUser=user; saveAll(); renderAll(); document.getElementById('authModal').classList.remove('active'); note(tt('misc.loginSuccess',{n:user.name}));
});

document.getElementById('registerBtn').addEventListener('click', async ()=>{
  const name=document.getElementById('registerName').value.trim();
  const email=document.getElementById('registerEmail').value.trim().toLowerCase();
  const pass=document.getElementById('registerPassword').value;
  const phone=safePhone(document.getElementById('registerPhone').value.trim());
  if(!name || !email || !pass){ note(tt('misc.required'),'danger'); return; }
  if(pass.length<8){ note(lang==='ar'?'كلمة المرور يجب أن تكون 8 أحرف أو أكثر.':'Password must be at least 8 characters.','danger'); return; }
  if(users.some(u=>(u.email||'').toLowerCase()===email)){ note(lang==='ar'?'هذا البريد مستخدم بالفعل.':'This email is already in use.','danger'); return; }
  const code=String(Math.floor(100000 + Math.random()*900000));
  pendingUser={name,email,phone,passwordHash:await sha256(pass),role:'user',verified:false,code};
  document.getElementById('verifyCodeInput').value='';
  document.getElementById('verifyInfoBox').textContent = lang==='ar' ? `رمز التحقق المحلي لهذا الحساب هو: ${code}` : `The local verification code for this account is: ${code}`;
  document.getElementById('authModal').classList.remove('active');
  document.getElementById('verifyModal').classList.add('active');
  note(tt('misc.verifyStart'),'warning');
});
document.getElementById('confirmVerifyBtn').addEventListener('click', ()=>{
  if(!pendingUser){ note(tt('misc.verifyNone'),'danger'); return; }
  const code=document.getElementById('verifyCodeInput').value.trim();
  if(code!==pendingUser.code){ note(tt('misc.verifyWrong'),'danger'); return; }
  const user={...pendingUser}; delete user.code; user.verified=true; users.push(user); currentUser=user; pendingUser=null; saveAll(); renderAll(); document.getElementById('verifyModal').classList.remove('active'); note(tt('misc.verifyDone'));
});

document.getElementById('openCheckoutBtn').addEventListener('click', ()=>{
  if(!cart.length){ note(tt('misc.emptyCart'),'danger'); return; }
  document.getElementById('checkoutName').value=currentUser?.name||''; document.getElementById('checkoutEmail').value=currentUser?.email||''; document.getElementById('checkoutPhone').value=currentUser?.phone||'';
  document.getElementById('checkoutDiscord').value=''; document.getElementById('checkoutPlayerId').value=''; document.getElementById('checkoutNotes').value='';
  document.getElementById('checkoutModal').classList.add('active');
});
document.getElementById('clearCartBtn').addEventListener('click', ()=>{ cart=[]; saveAll(); renderCart(); updateCheckoutRequirements(); note(tt('misc.cleared')); });
document.getElementById('createInvoiceBtn').addEventListener('click', ()=>{
  if(!cart.length){ note(tt('misc.emptyCart'),'danger'); return; }
  const name=document.getElementById('checkoutName').value.trim(); const email=document.getElementById('checkoutEmail').value.trim().toLowerCase(); const phone=safePhone(document.getElementById('checkoutPhone').value.trim());
  const discord=document.getElementById('checkoutDiscord').value.trim(); const rawPlayerId=document.getElementById('checkoutPlayerId').value.trim(); const payment=document.getElementById('checkoutPaymentMethod').value; const notes=document.getElementById('checkoutNotes').value.trim();
  if(!name || !email){ note(tt('misc.required'),'danger'); return; }
  const requirePlayerId = cartNeedsPlayerId();
  const playerId = requirePlayerId ? rawPlayerId : '';
  if(requirePlayerId && !/^\d{5,20}$/.test(playerId)){ note(tt('misc.badPlayer'),'danger'); return; }
  const now=new Date(); const month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const items=cart.map(x=>{ const ref=flatten(x.gameId,x.categoryId,x.productId); return {gameId:x.gameId,categoryId:x.categoryId,productId:x.productId,image:ref.product.image,name:ref.product.name,qty:x.qty,unitPrice:priceOf(ref.product)}; });
  const total=items.reduce((s,x)=>s+x.unitPrice*x.qty,0);
  const createdInvoice = {id:String(Date.now()),invoiceCode:'INV-'+Math.random().toString(36).slice(2,8).toUpperCase(),customerName:name,customerEmail:email,customerPhone:phone,discordName:discord,playerId,paymentMethod:payment,notes,items,total:round2(total),paymentStatus:'unpaid',deliveryStatus:'pending',currencyCode:activeCurrency,createdAt:now.toLocaleString(lang==='ar'?'ar-EG':'en-US'),month};
  invoices.unshift(createdInvoice);
  cart=[]; saveAll(); renderAll(); updateCheckoutRequirements(); document.getElementById('checkoutModal').classList.remove('active'); note(tt('misc.invoiceCreated'));
  redirectInvoiceToWhatsApp(createdInvoice);
});

document.getElementById('addProductBtn').addEventListener('click', ()=>{
  if(!isAdmin()){ note(tt('misc.adminOnly'),'danger'); return; }
  const gameId=document.getElementById('adminAddGameSelect').value; const categoryId=document.getElementById('adminAddCategorySelect').value; const name=document.getElementById('adminProductName').value.trim(); const eur=Number(document.getElementById('adminProductPrice').value.trim()); const oldRaw=document.getElementById('adminOldPrice').value.trim(); const oldVal=oldRaw===''?null:Number(oldRaw); const noteText=document.getElementById('adminProductNote').value.trim();
  if(!gameId || !categoryId || !name || !Number.isFinite(eur)){ note(tt('misc.addProductNeed'),'danger'); return; }
  const game=getGame(gameId); const category=getCategory(game,categoryId);
  category.products.unshift(product(`${gameId}-${categoryId}-${Date.now()}`, name, game.image, noteText || (lang==='ar'?'منتج جديد':'New product'), [lang==='ar'?'تمت إضافته من لوحة الأدمن':'Added from admin panel'], eur, Number.isFinite(oldVal)?oldVal:null, lang==='ar'?'جديد':'New'));
  document.getElementById('adminProductName').value=''; document.getElementById('adminProductPrice').value=''; document.getElementById('adminOldPrice').value=''; document.getElementById('adminProductNote').value='';
  saveAll(); renderAll(); note(tt('misc.addProductOk',{n:name,s:game.short,c:category.label}));
});

window.addEventListener('click', e=>['authModal','verifyModal','checkoutModal'].forEach(id=>{ const m=document.getElementById(id); if(e.target===m) m.classList.remove('active'); }));

(async()=>{
  ensureDataIntegrity();
  await ensureAdmin();
  renderAll();
  note(tt('misc.mainNotice'));
})();
</script>
</body>
</html>
