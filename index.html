<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>متجر شحن UC</title>


<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
margin:0;
}

.header{
background:#111827;
padding:20px;
font-size:28px;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin:5px;
width:220px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.price{
color:#fbbf24;
font-size:20px;
}

button{
background:#22c55e;
border:none;
padding:10px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

</style>


</head>


<body>

	
<div class="header">
ERROR STORE
</div>


<h3>اسم اللاعب</h3>
<input id="name" placeholder="اسم اللاعب">


<h3>ID اللاعب</h3>
<input id="playerid" placeholder="ID اللاعب">


<div class="products" id="products"></div>


<script>

let phone="35679999556"

let products=[

{name:"60 + 4 UC",price:"0.89$",img:"uc.png"},
{name:"300 + 43 UC",price:"4.49$",img:"uc.png"},
{name:"600 + 96 UC",price:"8.99$",img:"uc.png"},
{name:"1500 + 390 UC",price:"22.49$",img:"uc.png"},
{name:"3000 + 1030 UC",price:"44.99$",img:"uc.png"},
{name:"6000 + 2460 UC",price:"89.99$",img:"uc.png"},
{name:"12000 + 7380 UC",price:"179.99$",img:"uc.png"},
{name:"24000 + 9840 UC",price:"359.99$",img:"uc.png"},
{name:"30000 + 12300 UC",price:"449.99$",img:"uc.png"},
{name:"36000 + 14760 UC",price:"539.99$",img:"uc.png"},
{name:"60000 + 24600 UC",price:"899.99$",img:"uc.png"}

]

let box=document.getElementById("products")

products.forEach(p=>{

box.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">${p.price}</div>

<button onclick="buy('${p.name}','${p.price}')">
شراء
</button>

</div>

`

})

function buy(name,price){

let player=document.getElementById("name").value
let id=document.getElementById("playerid").value

if(player==""||id==""){
alert("اكتب الاسم و ID")
return
}

let msg=`طلب شحن UC

الاسم: ${player}
ID: ${id}

الباقة: ${name}
السعر: ${price}`

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg))

}

</script>


</body>


</html>
